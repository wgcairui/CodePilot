appId: com.codepilot.app
productName: CodePilot
publish:
  provider: github
  owner: op7418
  repo: CodePilot
directories:
  output: release
files:
  - dist-electron/**/*
  - "!node_modules"
  - "!src"
  - "!electron"
  - "!.next"
  - "!build"
  - "!scripts"
  - "!docs"
  - "!release"
  - "!data"
extraResources:
  - from: .next/standalone/
    to: standalone/
    filter:
      - "**/*"
      - "!node_modules"
      - "!release"
  - from: .next/standalone/node_modules/
    to: standalone/node_modules/
    filter: ["**/*"]
  - from: .next/standalone/.next/
    to: standalone/.next/
    filter: ["**/*"]
  - from: .next/static/
    to: standalone/.next/static/
    filter: ["**/*"]
  - from: public/
    to: standalone/public/
    filter: ["**/*"]
  - from: themes/
    to: standalone/themes/
    filter: ["*.json"]
  - from: build/
    to: .
    filter: ["icon.*"]
afterPack: scripts/after-pack.js
afterSign: scripts/after-sign.js
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  artifactName: "${productName}-${version}-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: false
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64, arm64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: false
  artifactName: "${productName}.Setup.${version}.${ext}"
linux:
  icon: build/icon.png
  category: Development
  artifactName: "${productName}-${version}-${arch}.${ext}"
  desktop:
    entry:
      Name: CodePilot
      Comment: A native desktop GUI for Claude Code
      Categories: Development;IDE;
      StartupWMClass: codepilot
  # arch is NOT specified here — controlled by CI via --x64 / --arm64 CLI flags.
  # Listing both arches here causes electron-builder to build both on every job,
  # which fails when cross-compiling native modules (zlib-sync -m64 on arm64).
  target:
    - AppImage
    - deb
    - rpm
